name: Veille Marche - Generation automatique

on:
  # DESACTIVE - La veille tourne sur le VPS Hetzner (cron toutes les 90min)
  # GitHub Actions creait des divergences git avec le VPS.
  # Garder workflow_dispatch pour lancement manuel d'urgence si le VPS tombe.
  # schedule:
  #   - cron: '30 5-18 * * 1-6'
  workflow_dispatch:  # Lancement manuel d'urgence uniquement

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate veille
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_DEFAULT: ${{ secrets.GEMINI_API_KEY_DEFAULT }}
        run: python veille_generator.py

      - name: Commit and push veille_live.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add veille_live.json veille_data.json
          git diff --cached --quiet || git commit -m "veille: update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase || true
          git push
